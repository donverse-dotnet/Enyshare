syntax = "proto3";

option csharp_namespace = "Pocco.Svc.EventBridge";
package event_service;


service Events {
    // Event deploy request
    rpc DeployEvent (DeployEventRequest) returns (DeployEventResponse);

    // Subscribe to the event stream for a specific account.
    rpc SubscribeEventStream (SubscribeEventStreamRequest) returns (stream SubscribeEventStreamData);
}

message DeployEventRequest {
    string account_id = 1;
    oneof event_data {
        AccountCreationRequestedEvent account_creation_requested_event = 2;
        AccountCreatedEvent account_created_event = 3;
        AccountCreationFailedEvent account_creation_failed_event = 4;
        AccountUpdatedRequestedEvent account_updated_requested_event = 5;
        AccountUpdatedEvent account_updated_event = 6;
        AccountUpdateFailedEvent account_update_failed_event = 7;
        AccountDeletionRequestedEvent account_deletion_requested_event = 8;
        AccountDeletedEvent account_deleted_event = 9;
        AccountDeletionFailedEvent account_deletion_failed_event = 10;

        OrganizationCreationRequestedEvent organization_creation_requested_event = 11;
        OrganizationCreatedEvent organization_created_event = 12;
        OrganizationCreationFailedEvent organization_creation_failed_event = 13;
        OrganizationUpdatedRequestedEvent organization_updated_requested_event = 14;
        OrganizationUpdatedEvent organization_updated_event = 15;
        OrganizationUpdateFailedEvent organization_update_failed_event = 16;
        OrganizationDeletionRequestedEvent organization_deletion_requested_event = 17;
        OrganizationDeletedEvent organization_deleted_event = 18;
        OrganizationDeletionFailedEvent organization_deletion_failed_event = 19;

        MessageCreatedEvent message_created_event = 20;
        MessageUpdatedEvent message_updated_event = 21;
        MessageDeletedEvent message_deleted_event = 22;

        OrganizationChannelCreationRequestedEvent organization_channel_creation_requested_event = 23;
        OrganizationChannelCreatedEvent organization_channel_created_event = 24;
        OrganizationChannelCreationFailedEvent organization_channel_creation_failed_event = 25;
        OrganizationChannelUpdatedRequestedEvent organization_channel_updated_requested_event = 26;
        OrganizationChannelUpdatedEvent organization_channel_updated_event = 27;
        OrganizationChannelUpdateFailedEvent organization_channel_update_failed_event = 28;
        OrganizationChannelDeletionRequestedEvent organization_channel_deletion_requested_event = 29;
        OrganizationChannelDeletedEvent organization_channel_deleted_event = 30;
        OrganizationChannelDeletionFailedEvent organization_channel_deletion_failed_event = 31;
    }
}

message DeployEventResponse {
    string event_id = 1;
}

message SubscribeEventStreamRequest {
  string account_id = 1;
}

message SubscribeEventStreamData {
    string event_id = 1;
    string author_id = 2;
    oneof event_data {
        AccountCreationRequestedEvent account_creation_requested_event = 3;
        AccountCreatedEvent account_created_event = 4;
        AccountCreationFailedEvent account_creation_failed_event = 5;
        AccountUpdatedRequestedEvent account_updated_requested_event = 6;
        AccountUpdatedEvent account_updated_event = 7;
        AccountUpdateFailedEvent account_update_failed_event = 8;
        AccountDeletionRequestedEvent account_deletion_requested_event = 9;
        AccountDeletedEvent account_deleted_event = 10;
        AccountDeletionFailedEvent account_deletion_failed_event = 11;

        OrganizationCreationRequestedEvent organization_creation_requested_event = 12;
        OrganizationCreatedEvent organization_created_event = 13;
        OrganizationCreationFailedEvent organization_creation_failed_event = 14;
        OrganizationUpdatedRequestedEvent organization_updated_requested_event = 15;
        OrganizationUpdatedEvent organization_updated_event = 16;
        OrganizationUpdateFailedEvent organization_update_failed_event = 17;
        OrganizationDeletionRequestedEvent organization_deletion_requested_event = 18;
        OrganizationDeletedEvent organization_deleted_event = 19;
        OrganizationDeletionFailedEvent organization_deletion_failed_event = 20;

        MessageCreatedEvent message_created_event = 21;
        MessageUpdatedEvent message_updated_event = 22;
        MessageDeletedEvent message_deleted_event = 23;

        OrganizationChannelCreationRequestedEvent organization_channel_creation_requested_event = 24;
        OrganizationChannelCreatedEvent organization_channel_created_event = 25;
        OrganizationChannelCreationFailedEvent organization_channel_creation_failed_event = 26;
        OrganizationChannelUpdatedRequestedEvent organization_channel_updated_requested_event = 27;
        OrganizationChannelUpdatedEvent organization_channel_updated_event = 28;
        OrganizationChannelUpdateFailedEvent organization_channel_update_failed_event = 29;
        OrganizationChannelDeletionRequestedEvent organization_channel_deletion_requested_event = 30;
        OrganizationChannelDeletedEvent organization_channel_deleted_event = 31;
        OrganizationChannelDeletionFailedEvent organization_channel_deletion_failed_event = 32;
    }
}


message AccountCreationRequestedEvent {
    string username = 1;
}
message AccountCreatedEvent {
    string account_id = 1;
    string username = 2;
    string email = 3;
}
message AccountCreationFailedEvent {
    string username = 1;
    string reason = 2;
}
message AccountUpdatedRequestedEvent {
    string account_id = 1;
    string username = 2;
    string email = 3;
}
message AccountUpdatedEvent {
    string account_id = 1;
    string username = 2;
    string email = 3;
}
message AccountUpdateFailedEvent {
    string account_id = 1;
    string reason = 2;
}
message AccountDeletionRequestedEvent {
    string account_id = 1;
}
message AccountDeletedEvent {
    string account_id = 1;
}
message AccountDeletionFailedEvent {
    string account_id = 1;
    string reason = 2;
}

message MessageCreatedEvent {
    string author_id = 1;
    string content = 2;
    repeated MessageAttachment attachments = 3;
}
message MessageUpdatedEvent {
    string message_id = 1;
    string content = 2;
    repeated MessageAttachment attachments = 3;
}
message MessageDeletedEvent {
    string message_id = 1;
}
message MessageAttachment {
    string id = 1;
    MessageAttachmentType type = 2;
}
enum MessageAttachmentType {
    IMAGE = 0;
    VIDEO = 1;
    AUDIO = 2;
    FILE = 3;
}

message OrganizationCreationRequestedEvent {
    string name = 1;
    string account_id = 2;
}
message OrganizationCreatedEvent {
    string organization_id = 1;
    string name = 2;
}
message OrganizationCreationFailedEvent {
    string name = 1;
    string reason = 2;
    string account_id = 3;
}
message OrganizationUpdatedRequestedEvent {
    string organization_id = 1;
    string name = 2;
}
message OrganizationUpdatedEvent {
    string organization_id = 1;
    string name = 2;
}
message OrganizationUpdateFailedEvent {
    string organization_id = 1;
    string reason = 2;
}
message OrganizationDeletionRequestedEvent {
    string organization_id = 1;
}
message OrganizationDeletedEvent {
    string organization_id = 1;
}
message OrganizationDeletionFailedEvent {
    string organization_id = 1;
    string reason = 2;
}

message OrganizationChannelCreationRequestedEvent {
    string organization_id = 1;
    string name = 2;
}
message OrganizationChannelCreatedEvent {
    string organization_id = 1;
    string channel_id = 2;
    string name = 3;
}
message OrganizationChannelCreationFailedEvent {
    string organization_id = 1;
    string name = 2;
    string reason = 3;
}
message OrganizationChannelUpdatedRequestedEvent {
    string organization_id = 1;
    string channel_id = 2;
    string name = 3;
}
message OrganizationChannelUpdatedEvent {
    string organization_id = 1;
    string channel_id = 2;
    string name = 3;
}
message OrganizationChannelUpdateFailedEvent {
    string organization_id = 1;
    string channel_id = 2;
    string reason = 3;
}
message OrganizationChannelDeletionRequestedEvent {
    string organization_id = 1;
    string channel_id = 2;
}
message OrganizationChannelDeletedEvent {
    string organization_id = 1;
    string channel_id = 2;
}
message OrganizationChannelDeletionFailedEvent {
    string organization_id = 1;
    string channel_id = 2;
    string reason = 3;
}

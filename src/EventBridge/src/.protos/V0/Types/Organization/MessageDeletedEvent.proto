syntax = "proto3";

option csharp_namespace = "Pocco.Svc.EventBridge.Protobufs.Types";
package pocco.svc.eventbridge.protobufs.types;

import "google/protobuf/timestamp.proto";


message V0OrganizationMessageDeletedEvent {
    // 組織ID
    string organization_id = 1;
    // チャットID
    string chat_id = 2;
    // メッセージID
    string message_id = 3;

    // イベントの発生日時
    google.protobuf.Timestamp created_at = 4;
}

syntax = "proto3";

option csharp_namespace = "Pocco.Svc.EventBridge.Protobufs.Types";
package pocco.svc.eventbridge.protobufs.types;

import "V0/Types/Organization/MessageModel.proto";
import "google/protobuf/timestamp.proto";


message V0OrganizationMessageCreatedEvent {
    // メッセージ
    pocco.svc.eventbridge.protobufs.types.V0MessageModel message = 1;

    // イベントの発生日時
    google.protobuf.Timestamp created_at = 2;
}

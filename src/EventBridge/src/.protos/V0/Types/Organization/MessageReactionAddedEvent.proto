syntax = "proto3";

option csharp_namespace = "Pocco.Svc.EventBridge.Protobufs.Types";
package pocco.svc.eventbridge.protobufs.types;

import "V0/Types/Organization/MessageModel.proto";
import "google/protobuf/timestamp.proto";


message V0OrganizationMessageReactionAddedEvent {
    // 組織ID
    string organization_id = 1;
    // チャットID
    string chat_id = 2;
    // メッセージID
    string message_id = 3;

    // リアクション
    pocco.svc.eventbridge.protobufs.types.V0MessageReactionModel reaction = 4;

    // イベントの発生日時
    google.protobuf.Timestamp created_at = 5;
}

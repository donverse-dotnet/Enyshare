syntax = "proto3";

option csharp_namespace = "Pocco.Svc.EventBridge.Protobufs.Services";
package pocco.svc.eventbridge.protobufs.services;

import "V0/Types/EventReceivedData.proto";
import "V0/Types/V0EventData.proto";

service V0EventReceiver {
    // イベントを購読する
    rpc NewEvent (pocco.svc.eventbridge.protobufs.types.V0EventData) returns (pocco.svc.eventbridge.protobufs.types.V0EventReceivedData);
}

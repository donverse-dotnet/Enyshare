syntax = "proto3";

option csharp_namespace = "Pocco.Libs.Protobufs.Services";
package pocco.libs.protobufs.services;

import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";

// アカウントなどのリクエストを受け付けるサービス
service V0AccountsService {
    // Get: Authorized
    rpc Get (GetAccountRequest) returns (GetAccountResponse);
    // Create: Anonymous
    rpc Create (CreateAccountRequest) returns (google.protobuf.Empty);
    // Update: Authorized
    rpc Update (UpdateAccountRequest) returns (UpdateAccountResponse);
    // Delete: Authorized
    rpc Delete (DeleteAccountRequest) returns (google.protobuf.Empty);
}

message GetAccountRequest {
    // 取得したいアカウントのID
    string account_id = 1;
}

message GetAccountResponse {
    // 取得したアカウントの情報
    Account account = 1;
}

message CreateAccountRequest {
    // Email
    string email = 1;
    // Password
    string password = 2;
}

message UpdateAccountRequest {
    // 新しいユーザー名
    string username = 1;
    // 新しいメールアドレス
    string email = 2;
}

message UpdateAccountResponse {
    // 更新したアカウントの情報
    Account account = 1;
}

message DeleteAccountRequest {
    // 削除するアカウントのID
    string account_id = 1;
}

message Account {
    string account_id = 1;
    string username = 2;
    google.protobuf.Timestamp created_at = 3; // ISO 8601形式の日時文字列
    google.protobuf.Timestamp updated_at = 4; // ISO 8601形式の日時文字列
}

syntax = "proto3";

option csharp_namespace = "Pocco.Libs.Protobufs.EventBridge.Types";
package pocco.libs.protobufs.eventbridge.types;

import "google/protobuf/timestamp.proto";
import "google/protobuf/struct.proto";
import "V0/Enums/V0EventTopics.proto";

message V0DeployedEventData {
    // イベントトピック
    pocco.libs.protobufs.eventbridge.enums.V0EventTopics topic = 1;
    // イベントタイプ
    string event_type = 2;
    // イベントID
    string event_id = 3;
    // イベント発行APIバージョン
    string api_version = 4;
    // イベント発行日時
    google.protobuf.Timestamp invoked_at = 5;
    // イベント発行者ID
    string invoked_by = 6;
    // イベントペイロード
    google.protobuf.Struct payload = 7;
}

syntax = "proto3";

option csharp_namespace = "Pocco.Libs.Protobufs.Accounts.Services";
package pocco.libs.protobufs.accounts.services;

import "google/protobuf/empty.proto";
import "V0/Types/Request.OrgListUpdate.proto";
import "V0/Types/Request.AccountGet.proto";
import "V0/Types/Model.AccountBase.proto";


// 内部からのアカウント操作用RPCサービスの定義
service V0InternalAccountService {
    // アカウントの組織リストを更新するRPCメソッド
    rpc UpdateOrgList(pocco.libs.protobufs.accounts.types.V0UpdateOrgListRequest) returns (google.protobuf.Empty);
    // 内部用のアカウント情報の取得をするRPCメソッド
    rpc GetAccountInfo(pocco.libs.protobufs.accounts.types.V0GetAccountRequest) returns (pocco.libs.protobufs.accounts.types.V0AccountBaseModel);
}

syntax = "proto3";

option csharp_namespace = "Pocco.Libs.Protobufs.Auth.Types";

package pocco.libs.protobufs.auth.types;

import "google/protobuf/timestamp.proto";


// ユーザーのセッション情報を保持するメッセージ
message V0SessionData {
    // セッションID
    string session_id = 1;
    // アカウントID
    string account_id = 2;
    // トークン
    string token = 3;
    // 有効期限（UNIXタイムスタンプ）
    google.protobuf.Timestamp expires_at = 4;
    // 作成日時（UNIXタイムスタンプ）
    google.protobuf.Timestamp created_at = 5;
    // 更新日時（UNIXタイムスタンプ）
    google.protobuf.Timestamp updated_at = 6;
}

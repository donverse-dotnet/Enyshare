syntax = "proto3";

package auth;

service AuthService {
    rpc SignIn(SignInRequest) returns (SignInResponse);
    rpc SignOut(SignOutRequest) returns (SignOutResponse);
    rpc UpdateAccount(UpdateAccountRequest) returns (UpdateAccountResponse);
    rpc HoldSession(HoldSessionRequest) returns (HoldSessionResponse);
}

message SignInRequest {
    string email = 1;
    string password = 2;
}

message SignInResponse {
    bool success = 1;
    string token = 2;
    string errorMessage = 3;
}

message SignOutRequest {
    string token = 1;
}

message SignOutResponse {
    bool success = 1;
    string errorMessage = 2;
}

message UpdateAccountRequest {
    string token = 1; // 認証済みユーザーのトークン
    string email = 2; // 新しいメールアドレス
    string password = 3; // 新しいパスワード
}

message UpdateAccountResponse {
    bool success = 1;
    string errorMessage = 2;
}

message HoldSessionRequest {
    string token = 1;
    int32 duration = 2; // セッションを保持する期間（秒単位）
}

message HoldSessionResponse {
    bool success = 1;
    string errorMessage = 2;
}

syntax = "proto3";

option csharp_namespace = "Pocco.Libs.Protobufs.Services";

package pocco.libs.protobufs.services;

import "Protos/V0/Types/CreateRequestData.proto";
import "Protos/V0/Types/DeleteRequestData.proto";
import "Protos/V0/Types/CreateReplyData.proto";
import "Protos/V0/Types/DeleteReplyData.proto";
import "Protos/V0/Types/InfoModel.proto";
import "google/protobuf/empty.proto";

service V0OrganizationInfoService{
    rpc Create(pocco.libs.protobufs.types.V0CreateOrganizationRequest) returns (pocco.libs.protobufs.types.V0CreateOrganizationReply);
    rpc Update(pocco.libs.protobufs.types.V0DeleteOrganizationRequest) returns (pocco.libs.protobufs.types.V0DeleteOrganizationReply);
    rpc CreateFromModel(pocco.libs.protobufs.types.V0InfoModel) returns (google.protobuf.Empty);
    // rpc GetInfo(pocco.libs.protobufs.types.V0GetOrganizationInfoRequest) returns (pocco.libs.protobufs.types.V0InfoModel);
}

message GetOrganizationInfoRequest{
    string id = 1;
}

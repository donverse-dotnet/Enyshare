syntax = "proto3";

option csharp_namespace = "Pocco.Libs.Protobufs.Types";

package pocco.libs.protobufs.types;

message V0DeleteOrganizationRequest{
    string id = 1;
    string invoked_by = 2;
}

message V0DeleteOrganizationReply{
    string id = 1;
    bool success = 2;
    string message = 3;
}

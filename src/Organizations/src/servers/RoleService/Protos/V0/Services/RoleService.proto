syntax = "proto3";

option csharp_namespace = "Pocco.Libs.Protobufs.Organizations_Role.Services";
package pocco.libs.protobufs.organizations_role.services;

import "V0/Types/GetRequestData.proto";
import "V0/Types/CreateRequestData.proto";
import "V0/Types/DeleteRequestData.proto";
import "V0/Types/UpdateRequestData.proto";
import "V0/Types/GetReplyData.proto";
import "V0/Types/RoleChangesReply.proto";
import "V0/Types/GetListDataRequest.proto";
import "V0/Types/GetListDataReply.proto";
import "V0/Types/RoleModel.proto";

//組織のロールを管理するRPCサービスの定義
service V0RoleService {
    //組織のロールを取得するrpcメソッド
    rpc Get(pocco.libs.protobufs.organizations_role.types.V0GetRequest) returns (pocco.libs.protobufs.organizations_role.types.V0GetReply);
    //組織のロールを作成するRPCメソッド
    rpc Create(pocco.libs.protobufs.organizations_role.types.V0CreateRequest) returns (pocco.libs.protobufs.organizations_role.types.V0RoleChangesReply);
    //組織のロールを更新するRPCメソッド
    rpc Update(pocco.libs.protobufs.organizations_role.types.V0UpdateRequest) returns (pocco.libs.protobufs.organizations_role.types.V0RoleChangesReply);
    //組織のロールを削除するRPCメソッド
    rpc Delete(pocco.libs.protobufs.organizations_role.types.V0DeleteRequest) returns (pocco.libs.protobufs.organizations_role.types.V0RoleChangesReply);
    //組織のロールリストを取得するRPCメソッド
    rpc GetList(pocco.libs.protobufs.organizations_role.types.V0GetListRequest) returns (pocco.libs.protobufs.organizations_role.types.V0GetListReply);
}

// 組織のロールを内部から操作するためのRPCサービスの定義
service V0InternalOrganizationRoleService {
    //組織のロールを作成するRPCメソッド
    rpc Create(pocco.libs.protobufs.organizations_role.types.V0CreateRequest) returns (pocco.libs.protobufs.organizations_role.types.V0RoleModel);
}

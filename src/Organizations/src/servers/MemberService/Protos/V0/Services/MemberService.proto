syntax = "proto3";

option csharp_namespace = "Pocco.Libs.Protobufs.Types";
package pocco.libs.protobufs.types;

import "Member.proto";
import "CreateMemberData.proto";
import "DeleteMemberData.proto";

service MemberService {
    rpc RequestToJoin(CreateMemberRequest) returns (MemberResponse);
    rpc UpdateOrgUesr(UpdateMemberRequest) returns (MemberResponse);
    rpc RequestToLeave(DeleteMemberRequest) returns (MemberResponse);
    rpc Get(GetMemberRequest) returns (MemberResponse);
}

message GetMemberRequest{
    string id = 1;
}

message UpdateMemberRequest{
    string id = 1;
    repeated string roles = 2;
    string nickname = 3;
}

syntax = "proto3";

option csharp_namespace = "Pocco.Libs.Protobufs.Types";
package pocco.libs.protobufs.types;

message V0DeleteMemberRequest{
    string id = 1;
    string organization_id = 2;
    string nickname = 3;
}

message V0DeleteMemberReply{
    bool success = 1;
    string message = 2;
    string deleted_at = 3;
}

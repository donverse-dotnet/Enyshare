syntax = "proto3";

option csharp_namespace = "Pocco.Libs.Protobufs.Organizations_Member.Types";

package pocco.libs.protobufs.organizations_member.types;

message Member{
    string id = 1;
    repeated string role = 2;
    string join_at = 3;
    string nickname = 4;
    string organization_id = 5;
    bool is_active = 6;
}

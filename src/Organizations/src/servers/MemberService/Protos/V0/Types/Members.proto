syntax = "proto3";

option csharp_namespace = "Pocco.Libs.Protobufs.Types";
package pocco.libs.protobufs.types;

message Member{
    string id = 1;
    repeated string roles = 2;
    string join_at = 3;
    string nickname = 4;
    string org_id = 5;
    bool is_active = 6;
}

message MemberResponse {
    string id = 1;
    repeated string relos = 2;
    string join_at = 3;
    string nickname = 4;
}

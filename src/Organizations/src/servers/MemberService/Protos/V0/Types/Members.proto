syntax = "proto3";

option csharp_namespace = "Pocco.Libs.Protobufs.Types";
package pocco.libs.protobufs.types;

import "google/protobuf/timestamp.proto";

message Member{
    string id = 1;
    repeated string role = 2;
    string join_at = 3;
    string nickname = 4;
    string organization_id = 5;
    bool is_active = 6;
}

message MemberResponse {
    string id = 1;
    repeated string relo = 2;
    string join_at = 3;
    string nickname = 4;
}

message V0UpdateMemberRequest{
    string id = 1;
    repeated string role = 2;
    string nickname = 3;
    string join_at = 4;
}

message V0UpdateMemberReply{
    string id = 1;
    repeated string role = 2;
    string nickname = 3;
    string join_at = 4;
    V0MemberModel member = 5;
}

message V0GetMemberRequest{
    string id = 1;
}

message V0GetMemberReply{
    string id = 1;
    V0MemberModel member = 2;
}

message V0MemberModel{
    string id = 1;
    string organization_id = 2;
    string user_id = 3;
    repeated string role = 4;
    google.protobuf.Timestamp joined_at = 5;
    google.protobuf.Timestamp deleted_at = 6;
}


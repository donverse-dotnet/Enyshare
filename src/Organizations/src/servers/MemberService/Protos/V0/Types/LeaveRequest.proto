syntax = "proto3";

option csharp_namespace = "Pocco.Libs.Protobufs.Organizations_Member.Types";
package pocco.libs.protobufs.organizations_member.types;

// 脱退をリクエストを表すモデル
message V0LeaveRequest {
    // 組織の一意の識別子
    string organization_id = 1;
    // メンバーの一意の識別子
    string member_id = 2;

    // リクエストを送信したユーザーの一意の識別子
    string invoked_by = 3;

    string name = 4;
    string deleted_by = 5;
}

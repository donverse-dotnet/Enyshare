syntax = "proto3";

option csharp_namespace = "Pocco.Libs.Protobufs.Types";
package pocco.libs.protobufs.types;

import "V0/Types/Members.proto";

message V0CreateMemberRequest{
    string id = 1;
    string nickname = 2;
    string invite_code = 3;
    string organization_id = 4;
}

message V0CreateMemberReply{
    V0MemberModel member = 1;
    string organization_id = 2;
}

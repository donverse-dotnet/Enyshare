syntax = "proto3";

option csharp_namespace = "Pocco.Libs.Protobufs.Accounts.Types";
package pocco.libs.protobufs.accounts.types;

import "V0/Types/Model.AccountStatus.proto";
import "google/protobuf/timestamp.proto";


// 基本アカウント情報
message V0AccountBaseModel {
    string id = 1;
    string username = 2;
    string avatarUrl = 3;
    pocco.libs.protobufs.accounts.types.V0AccountStatusModel status = 4;
    google.protobuf.Timestamp createdAt = 5;
}

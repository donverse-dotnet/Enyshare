syntax = "proto3";

option csharp_namespace = "Pocco.Libs.Protobufs.Accounts.Types";
package pocco.libs.protobufs.accounts.types;

import "V0/Enums/AccountRoles.proto";
import "V0/Types/Model.AccountStatus.proto";
import "V0/Types/Model.AccountNotificationSettings.proto";
import "google/protobuf/timestamp.proto";


// アカウント情報
message V0AccountModel {
    string id = 1;
    string username = 2;
    string avatarUrl = 3;

    string email = 4;
    bool emailVerified = 5;

    pocco.libs.protobufs.accounts.enums.V0AccountRoles role = 6;
    pocco.libs.protobufs.accounts.types.V0AccountStatusModel status = 7;

    repeated string organizationIds = 8;

    google.protobuf.Timestamp createdAt = 9;
    google.protobuf.Timestamp updatedAt = 10;
    google.protobuf.Timestamp lastLoginAt = 11;

    pocco.libs.protobufs.accounts.types.V0AccountNotificationSettings notifications = 12;
}

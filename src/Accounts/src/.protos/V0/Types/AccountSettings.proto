syntax = "proto3";

option csharp_namespace = "Pocco.Libs.Protobufs.Types";

package pocco.libs.protobufs.types;

message V0Setting {
  string id = 1;
  V0LayoutSetting layout = 2;
  V0AccessibilitySetting accessibility = 3;
  V0NotificationSetting notifications = 4;
  V0InteractionSetting interaction = 5;
  V0ExtensionAppSetting extensionApps = 6;
}

message V0LayoutSetting {

  //tab or sidebar
  string navigationMode = 1;

  //light or dark
  string themeMode = 2;

}

message V0ResponsiveSetting {
  bool enable = 1;

  //pc or mobile or tablet
  repeated string preferredDevices = 2;
}

message V0CustomThemeSetting {
  //color
  string primaryColor = 1;

  // font
  string fontFamily = 2;
}

message V0AccessibilitySetting {
  bool highContrast = 1;
  bool keyboardNavigation = 2;

  //normal or high or custom
  string contrastLevel = 3;
}

message V0NotificationSetting {
  bool email = 1;
  bool push = 2;
  bool showBadge = 3;
  int32 unreadCount = 4;
}

message V0InteractionSetting {
  bool enableVoting = 1;
  bool enableReactions = 2;
  repeated string reactionTypes = 3;
}

message V0ExtensionAppSetting {
  bool chatbotEnabled = 1;
  repeated string miniGames = 2;
  map<string, string> externalAppUrls = 3;
}

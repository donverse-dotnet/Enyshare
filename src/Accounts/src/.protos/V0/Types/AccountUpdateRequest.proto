syntax = "proto3";

option csharp_namespace = "Pocco.Libs.Protobufs.Types";

package pocco.libs.protobufs.types;

import "V0/Types/AccountStatusMessage.proto";
import "V0/Types/AccountNotificationSettings.proto";

message V0UpdateRequest {
    string id = 1;
    string name = 2;
    string avatarUrl = 3;
    string password = 4;
    string onetime_code = 5;
    string email = 6;

    pocco.libs.protobufs.types.V0AccountStatusMessage status = 7;

    pocco.libs.protobufs.types.V0AccountNotificationSettings notifications = 8;
}
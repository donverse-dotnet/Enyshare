syntax = "proto3";

option csharp_namespace = "Pocco.Svc.Accounts.Protos";

package account;

// The account service definition.

service UserAccounts {

  // Sends a account

  rpc RegisterAccount(RegisterAccountRequest) returns (RegisterAccountReply);

  rpc UpdateAccount(UpdateAccountRequest) returns (UpdateAccountReply);

  rpc DeleteAccount(DeleteAccountRequest) returns (DeleteAccountReply);
}

// The request message.

message RegisterAccountRequest {
  string email = 1;
  string password = 2;
  
}

message UpdateAccountRequest {
    string id = 1;
    string name = 2;
    string iconData = 3;
    string statusMessage = 4;
    string password = 5;
    string email = 6;
    bool notice = 7;
    string role = 8;
    bool isActive = 9;

    bool updateAt = 10;
    bool passwordUpdateAt = 11;
    bool emailUpdateAt = 12;
    bool lastLoginAt = 13;
    
}

message DeleteAccountRequest {
    string accountId = 1;
    bool deletionRequestAt = 2;
}
// The response message.

message RegisterAccountReply {
  string message = 1;
  bool Succes = 2;
}


message UpdateAccountReply {
    string message = 1;
    bool Succes = 2;
}

message DeleteAccountReply {
    string message = 1;
    bool Succes = 2;
}

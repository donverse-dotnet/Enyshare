syntax = "proto3";


option csharp_namespace = "Pocco.Svc.Accounts.Protos.Account";
package account;

import "uisetting.proto";

// The account service definition.

service UserAccounts {

  // Sends a account

  rpc RegisterAccount(RegisterAccountRequest) returns (RegisterAccountReply);

  rpc UpdateAccount(UpdateAccountRequest) returns (UpdateAccountReply);

  rpc DeleteAccount(DeleteAccountRequest) returns (DeleteAccountReply);
}

// The request message.

message RegisterAccountRequest {
  string email = 1;
  string password = 2;
  
}

message UpdateAccountRequest {
    string id = 1;
    string userId = 2;
    string name = 3;
    string iconData = 4;
    string statusMessage = 5;
    string password = 6;
    string email = 7;
    bool notice = 8;
    string role = 9;
    bool isActive = 10;

    bool updateAt = 11;
    bool passwordUpdateAt = 12;
    bool emailUpdateAt = 13;
    bool lastLoginAt = 14;
    
    ui.UiSetting accountUisettings = 15;
}

message DeleteAccountRequest {
    string accountId = 1;
    bool deletionRequestAt = 2;
}
// The response message.

message RegisterAccountReply {
  string message = 1;
  bool Succes = 2;
}


message UpdateAccountReply {
    string message = 1;
    bool Succes = 2;
}

message DeleteAccountReply {
    string message = 1;
    bool Succes = 2;
}

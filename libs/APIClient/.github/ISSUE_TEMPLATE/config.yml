# 空白のIssueテンプレートを無効にする
blank_issues_enabled: false

# Issueテンプレートの設定
defaults:
  - template: "Bug.yml"
    name: "🙋‍♂️ Report bugs"
    about: "The template for reporting bugs for this project."

  - template: "Feature.yml"
    name: "💡 Request features"
    about: "The template for requesting new features for this project."

  - template: "Task.yml"
    name: "🦺 Create task"
    about: "The template for creating tasks for this project."

